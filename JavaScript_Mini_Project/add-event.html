<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Event</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      padding: 40px;
    }

    h1 {
      text-align: center;
    }


    form {
      max-width: 450px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    #notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: #28a745;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      display: none;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Add / Edit Event</h1>

  <div id="notification"></div>

  <form id="eventForm">

    <label>Title</label>
    <input type="text" id="title" required />

    <label>Description</label>
    <input type="text" id="description" required />

    <label>Date</label>
    <input type="date" id="date" required />

    <label>Location</label>
    <input type="text" id="location" required />

    <label>Capacity</label>
    <input type="number" id="capacity" required />

    <button type="submit">Save Event</button>

  </form>

  <script type="module">
    import { handleAddEvent, loadEventForEdit } from "./js/controllers/eventController.js";

    document.getElementById("eventForm").addEventListener("submit", handleAddEvent);

    loadEventForEdit();

    const params = new URLSearchParams(window.location.search);
    if (params.get("id")) {
      document.querySelector("button").textContent = "Update Event";
    }
  </script>

</body>
</html>
