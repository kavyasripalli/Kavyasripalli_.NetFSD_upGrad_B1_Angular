<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register for Event</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      padding: 30px;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #007bff;
      padding: 10px 20px;
      border-radius: 6px;
      color: white;
      margin-bottom: 20px;
    }

    .logo {
      margin: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
      font-weight: bold;
    }

     #notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: #28a745;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      display: none;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    h1, h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-bottom: 30px;
    }

    th {
      background-color: #007bff;
      color: white;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border: 1px solid #ddd;
    }

    tr:hover {
      background-color: #e9f5ff;
      cursor: pointer;
    }

    form {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #28a745;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #218838;
    }
  </style>
</head>

<body>

<h1>Event Registration</h1>
<div id="notification"></div>

<nav class="navbar">
  <h2 class="logo">EventSphere</h2>

  <div class="nav-links">
    <a href="register.html">Home</a>
  </div>
</nav>

<h2>Available Events</h2>
<p style="text-align: center; color: #555;">Click an event row to automatically fill Event ID</p>
<div id="eventList"></div>

<h2>Register for Event</h2>

<form id="registrationForm">
  <input type="number" id="eventId" placeholder="Event ID" required />
  <input type="text" id="participantName" placeholder="Your Name" required />
  <input type="email" id="email" placeholder="Email" required />
  <input type="text" id="phone" placeholder="Phone (10 digits)" required />
  <button type="submit">Register</button>
</form>

<script type="module">
  import { handleRegistration, loadEventsForRegistration } from "./js/controllers/registrationController.js";

  document
    .getElementById("registrationForm")
    .addEventListener("submit", handleRegistration);

  loadEventsForRegistration();
</script>

</body>
</html>
