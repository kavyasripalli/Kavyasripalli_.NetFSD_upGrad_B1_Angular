<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f4f6f8;
    }

    h1 {
      text-align: center;
    }

    #notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: #28a745;
      color: white;
      padding: 12px 18px;
      border-radius: 6px;
      display: none;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    #eventList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #007bff;
      padding: 10px 20px;
      border-radius: 6px;
      color: white;
    }

    .logo {
      margin: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
      font-weight: bold;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    .event-card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .event-card h3 {
      margin-top: 0;
    }

    .search-box {
      text-align: center;
      margin: 20px 0;
    }

    .search-box input {
      width: 300px;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .status {
      padding: 4px 10px;
      border-radius: 5px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      display: inline-block;
      margin-top: 5px;
    }

    .status.open {
      background-color: #28a745;
    }

    .status.full {
      background-color: #dc3545;
    }

    .status.completed {
      background-color: #6c757d;
    }

    button {
      padding: 6px 12px;
      margin-right: 8px;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
      color: #666666;
    }

    button:hover {
      background-color: #0056b3;
    }

    .add-btn {
      display: block;
      margin: 20px auto;
      padding: 10px 16px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <h2 class="logo">EventSphere</h2>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="add-event.html">Add Event</a>
    </div>
  </nav>

  <h1>Event Management System</h1>
  <div class="search-box">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search events by title..."/>
    </div>

  <div id="notification"></div>

  <a href="add-event.html">
    <button class="add-btn">Add New Event</button>
  </a>

  <div id="eventList"></div>

  <script type="module">
    import { loadEvents, setupSearch } from "./js/controllers/eventController.js";

    loadEvents();
    setupSearch();
  </script>

</body>
</html>
