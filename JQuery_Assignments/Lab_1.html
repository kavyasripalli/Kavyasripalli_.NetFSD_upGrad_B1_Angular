<!DOCTYPE html>
<html>
<head>
    <title>jQuery Selectors Practice</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <h2 id="title">jQuery Selector Example</h2>

    <p>This is paragraph 1</p>
    <p>This is paragraph 2</p>
    <p>This is paragraph 3</p>

    <div class="box">Box 1</div>
    <div class="box">Box 2</div>

    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
    </ul>

    <table border="1">
        <tr>
            <td>Row 1</td>
        </tr>
        <tr>
            <td>Row 2</td>
        </tr>
        <tr>
            <td>Row 3</td>
        </tr>
        <tr>
            <td>Row 4</td>
        </tr>
    </table>

    <button id="run">Run jQuery</button>

    <script>
        $(document).ready(function(){

            $("#run").click(function(){

                $("p").css("color","blue");

                $("#title").css("background","yellow");

                $(".box").css("border","2px solid red");

                $("li:first").css("color","green");

                $("li:last").css("color","orange");

                $("tr:even").hide();

            });

        });
    </script>

</body>
</html>
