<!DOCTYPE html>
<html>
<head>
    <title>Event Handling</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <button id="alertBtn">Click Me</button>

    <br><br>

    <img id="image" src="headphones.png" width="150">

    <br><br>

    <p id="para">Double click this paragraph to hide it.</p>

    <br>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <p id="message"></p>

    <br>

    <form id="myForm">
        <input type="text" placeholder="Enter something">
        <button type="submit">Submit</button>
    </form>

    <script>
        $(document).ready(function(){

            $("#alertBtn").click(function(){
                alert("Button Clicked");
            });

            $("#image").hover(function(){
                $("#image").attr("src","https://via.placeholder.com/150/ff0000");
            }, function(){
                $("#image").attr("src","https://via.placeholder.com/150");
            });

            $("#para").dblclick(function(){
                $("#para").hide();
            });

            $("#nameInput").blur(function(){
                $("#message").text("Input field lost focus");
            });

            $("#myForm").submit(function(event){
                event.preventDefault();
                alert("Form submission prevented");
            });

        });
    </script>

</body>
</html>
