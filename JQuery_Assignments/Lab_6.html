<!DOCTYPE html>
<html>

<head>
    <title>Book CRUD</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <h2>Book Management</h2>

    <input type="hidden" id="bookId">

    <input type="text" id="title" placeholder="Book Title">

    <input type="text" id="author" placeholder="Author">

    <button id="addBook">Add Book</button>

    <button id="updateBook">Update Book</button>

    <p id="toast"></p>

    <table border="1">

        <thead>

            <tr>

                <th>ID</th>

                <th>Title</th>

                <th>Author</th>

                <th>Edit</th>

                <th>Delete</th>

            </tr>

        </thead>

        <tbody id="bookTable"></tbody>

    </table>

<script>

    var api = "http://localhost:3000/books";

    $(document).ready(function () {

        loadBooks();

        function loadBooks() {

            $.ajax({

                url: api,

                method: "GET",

                success: function (data) {

                    var rows = "";

                    $.each(data, function (index, book) {

                        rows += "<tr>" +

                                    "<td>" + book.id + "</td>" +

                                    "<td>" + book.title + "</td>" +

                                    "<td>" + book.author + "</td>" +

                                    "<td><button onclick='editBook(" + book.id + ")'>Edit</button></td>" +

                                    "<td><button onclick='deleteBook(" + book.id + ")'>Delete</button></td>" +

                                "</tr>";

                    });

                    $("#bookTable").html(rows);

                }

            });

        }

        $("#addBook").click(function () {

            var title = $("#title").val();

            var author = $("#author").val();

            if (title === "" || author === "") {

                alert("All fields are required");

                return;

            }

            $.ajax({

                url: api,

                method: "POST",

                contentType: "application/json",

                data: JSON.stringify({

                    title: title,

                    author: author

                }),

                success: function () {

                    $("#toast").text("Book added successfully");

                    $("#title").val("");

                    $("#author").val("");

                    loadBooks();

                }

            });

        });

        window.editBook = function (id) {

            $.ajax({

                url: api + "/" + id,

                method: "GET",

                success: function (book) {

                    $("#bookId").val(book.id);

                    $("#title").val(book.title);

                    $("#author").val(book.author);

                }

            });

        };

        $("#updateBook").click(function () {

            var id = $("#bookId").val();

            var title = $("#title").val();

            var author = $("#author").val();

            $.ajax({

                url: api + "/" + id,

                method: "PUT",

                contentType: "application/json",

                data: JSON.stringify({

                    id: Number(id),

                    title: title,

                    author: author

                }),

                success: function () {

                    $("#toast").text("Book updated successfully");

                    $("#bookId").val("");

                    $("#title").val("");

                    $("#author").val("");

                    loadBooks();

                }

            });

        });

        window.deleteBook = function (id) {

            if (confirm("Are you sure you want to delete this book?")) {

                $.ajax({

                    url: api + "/" + id,

                    method: "DELETE",

                    success: function () {

                        $("#toast").text("Book deleted successfully");

                        loadBooks();

                    }

                });

            }

        };

    });

</script>

</body>

</html>
